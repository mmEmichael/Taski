services:
  bot:
    build: ./services/bot
    container_name: bot
    depends_on:
     - server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SERVER_BASE_URL=http://nginx:80
      - TG_TOKEN=${TG_TOKEN}
      - TZ=Europe/Moscow
    volumes:
      - ./services/bot:/app
    restart: unless-stopped
  worker:
    build: ./services/bot
    container_name: celery_worker
    # Запуск воркера (укажите путь к объекту celery_app)
    command: celery -A app.services.celery.celery_service:app worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TG_TOKEN=${TG_TOKEN}
      - PYTHONPATH=/app
      - TZ=Europe/Moscow
    volumes:
      - ./services/bot:/app
    restart: unless-stopped
  server:
    build: ./services/server
    container_name: server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/Moscow
    volumes:
      - ./services/server:/app
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  db:
    image: postgres:15-alpine
    container_name: db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  db_data: